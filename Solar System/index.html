<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="solar-system"> 

        <div class="sun">
            <span class="planet-name">Güneş</span>
        </div>

        <div class="orbit mercury-orbit">
            <div class="planet mercury">
                <span class="planet-name">Merkür</span>
            </div>
        </div>

        <div class="orbit venus-orbit">
            <div class="planet venus">
                <span class="planet-name">Venüs</span>
            </div>
        </div>

        <div class="orbit earth-orbit">
             <div class="planet earth">
                 <span class="planet-name">Dünya</span>
                
                 <div class="moon-orbit">
                     <div class="moon"></div>
                 </div>
             </div>
         </div>
    
         <div class="asteroid-belt"></div>

         <div class="orbit mars-orbit">
            <div class="planet mars">
                <span class="planet-name">Mars</span>
            </div>
        </div>

        <div class="orbit jupiter-orbit">
            <div class="planet jupiter">
                <span class="planet-name">Jüpiter</span>
            </div>
        </div>

        <div class="orbit saturn-orbit">
            <div class="planet saturn">
                <span class="planet-name">Satürn</span>
            </div>
        </div>

        <div class="orbit uranus-orbit">
            <div class="planet uranus">
                <span class="planet-name">Uranüs</span>
            </div>
        </div>

        <div class="orbit neptune-orbit">
            <div class="planet neptune">
                <span class="planet-name">Neptün</span>
            </div>
        </div>

     </div>

    <script src="index.js"></script>
</body>
</html>
